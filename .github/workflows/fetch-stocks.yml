name: Fetch Stock Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch stock + index data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SYMBOLS: "AAPL,GOOGL,MSFT,AMZN,TSLA,^DJI,^GSPC,^IXIC"
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          const API_KEY = process.env.FINNHUB_API_KEY

          const SYMBOLS = (process.env.SYMBOLS || "")
            .split(",")
            .filter(Boolean)
            .map(s => s.trim().toUpperCase())

          const BASE = "https://finnhub.io/api/v1"

          function get(url) {
            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", chunk => data += chunk)
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(data))
                  } catch {
                    resolve({})
                  }
                })
              }).on("error", () => resolve({}))
            })
          }

          const NAMES = {
            "^DJI": "Dow Jones Industrial Average",
            "^GSPC": "S&P 500",
            "^IXIC": "Nasdaq Composite"
          }

          async function fetchAsset(sym) {
            const [quote, profile] = await Promise.all([
              get(`${BASE}/quote?symbol=${sym}&token=${API_KEY}`),
              get(`${BASE}/stock/profile2?symbol=${sym}&token=${API_KEY}`)
            ])

            return {
              symbol: sym,
              type: sym.startsWith("^") ? "index" : "stock",
              name: profile.name || NAMES[sym] || sym,
              price: quote.c ?? 0,
              change: quote.d ?? 0,
              changePercent: quote.dp ?? 0,
              logo: profile.logo || ""
            }
          }

          ;(async () => {
            console.log("Fetching stock + index data...")

            const results = {}

            for (const sym of SYMBOLS) {
              try {
                const data = await fetchAsset(sym)

                // safety fallback if index returns 0s
                if (sym.startsWith("^") && data.price === 0) {
                  console.warn(`Index ${sym} returned 0 — may be temporarily unavailable`)
                }

                results[sym] = data
              } catch {
                results[sym] = {
                  symbol: sym,
                  type: sym.startsWith("^") ? "index" : "stock",
                  error: true
                }
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              data: results
            }

            fs.writeFileSync("stocks.json", JSON.stringify(output, null, 2))
            console.log("stocks.json updated")
          })()
          EOF

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "chore: refresh stock data [skip ci]" || echo "No changes"
          git push
