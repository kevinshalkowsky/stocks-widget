name: Fetch Market Dashboard Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market data (Stooq FIXED)
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          const SYMBOLS = [
            "aapl.us",
            "googl.us",
            "msft.us",
            "amzn.us",
            "tsla.us",
            "^dji",
            "^spx",
            "^ndq"
          ]

          const NAMES = {
            "aapl.us": "Apple Inc",
            "googl.us": "Alphabet Inc",
            "msft.us": "Microsoft Corp",
            "amzn.us": "Amazon.com Inc",
            "tsla.us": "Tesla Inc",
            "^dji": "Dow Jones",
            "^spx": "S&P 500",
            "^ndq": "Nasdaq"
          }

          function getCSV(symbol) {
            const url = `https://stooq.com/q/l/?s=${symbol}&f=sd2t2ohlc&h&e=csv`

            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", chunk => data += chunk)
                res.on("end", () => resolve(data))
              }).on("error", () => resolve(""))
            })
          }

          function parseCSV(csv) {
            const lines = csv.trim().split("\n")
            if (lines.length < 2) return null

            const cols = lines[1].split(",")

            const open = parseFloat(cols[3])
            const close = parseFloat(cols[6])

            if (isNaN(open) || isNaN(close)) return null

            return { open, close }
          }

          function direction(change) {
            if (change > 0) return "up"
            if (change < 0) return "down"
            return "flat"
          }

          function clamp(n) {
            return Number(n.toFixed(2))
          }

          ;(async () => {
            console.log("Fetching FIXED Stooq data...")

            const results = {}

            for (const sym of SYMBOLS) {
              try {
                const csv = await getCSV(sym)
                const data = parseCSV(csv)

                if (!data) {
                  results[sym] = {
                    symbol: sym,
                    name: NAMES[sym] || sym,
                    type: "stock",
                    price: 0,
                    change: 0,
                    changePercent: 0,
                    direction: "flat",
                    sparkline: []
                  }
                  continue
                }

                const price = data.close
                const change = price - data.open
                const changePercent = data.open ? (change / data.open) * 100 : 0

                results[sym] = {
                  symbol: sym,
                  name: NAMES[sym] || sym,
                  type: "stock",
                  price: clamp(price),
                  change: clamp(change),
                  changePercent: clamp(changePercent),
                  direction: direction(change),
                  sparkline: []
                }

              } catch {
                results[sym] = {
                  symbol: sym,
                  name: NAMES[sym] || sym,
                  type: "stock",
                  price: 0,
                  change: 0,
                  changePercent: 0,
                  direction: "flat",
                  sparkline: []
                }
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              marketStatus: "live",
              data: results
            }

            fs.writeFileSync("stocks.json", JSON.stringify(output, null, 2))
            console.log("SUCCESS: market data updated")
          })()
          EOF

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "chore: fix market feed data [skip ci]" || echo "No changes"
          git push
