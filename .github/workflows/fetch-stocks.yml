name: Market Data Engine (Final Stable Build)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build Market Dataset
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          // -----------------------------
          // CONFIG
          // -----------------------------
          const STOCKS = ["aapl.us","googl.us","msft.us","amzn.us","tsla.us"]
          const INDEXES = ["^dji","^spx","^ndq"]

          const NAMES = {
            "aapl.us": "Apple Inc",
            "googl.us": "Alphabet Inc",
            "msft.us": "Microsoft Corp",
            "amzn.us": "Amazon.com Inc",
            "tsla.us": "Tesla Inc",
            "^dji": "Dow Jones",
            "^spx": "S&P 500",
            "^ndq": "Nasdaq"
          }

          const API_KEY = process.env.FINNHUB_API_KEY
          const BASE = "https://finnhub.io/api/v1"

          // -----------------------------
          // HELPERS
          // -----------------------------
          function get(url) {
            return new Promise(resolve => {
              https.get(url, res => {
                let data = ""
                res.on("data", c => data += c)
                res.on("end", () => {
                  try { resolve(JSON.parse(data)) }
                  catch { resolve({}) }
                })
              }).on("error", () => resolve({}))
            })
          }

          function cleanSymbol(sym) {
            return sym.replace(".us", "").replace("^", "").toUpperCase()
          }

          function safe(n) {
            return (n === null || n === undefined || isNaN(n)) ? 0 : Number(n)
          }

          function direction(change) {
            if (change > 0) return "up"
            if (change < 0) return "down"
            return "flat"
          }

          // -----------------------------
          // STOOQ PRICE ENGINE
          // -----------------------------
          function getCSV(symbol) {
            const url = `https://stooq.com/q/l/?s=${symbol}&f=sd2t2ohlc&h&e=csv`

            return new Promise(resolve => {
              https.get(url, res => {
                let data = ""
                res.on("data", c => data += c)
                res.on("end", () => resolve(data))
              }).on("error", () => resolve(""))
            })
          }

          function parseCSV(csv) {
            const lines = csv.trim().split("\n")
            if (lines.length < 2) return null

            const p = lines[1].split(",")

            const open = parseFloat(p[3])
            const close = parseFloat(p[6])

            if (!open || !close) return null

            return { open, close }
          }

          // -----------------------------
          // FINNHUB ENRICHMENT
          // -----------------------------
          async function enrich(symbol) {
            const [profile, metrics, news] = await Promise.all([
              get(`${BASE}/stock/profile2?symbol=${symbol}&token=${API_KEY}`),
              get(`${BASE}/stock/metric?symbol=${symbol}&token=${API_KEY}`),
              get(`${BASE}/company-news?symbol=${symbol}&from=2026-01-01&to=2026-12-31&token=${API_KEY}`)
            ])

            const m = metrics?.metric || {}

            return {
              fiftyTwoWeek: {
                low: safe(m["52WeekLow"]),
                high: safe(m["52WeekHigh"])
              },
              marketCap: safe(profile.marketCapitalization),
              peRatio: safe(m.peBasicExclExtraTTM),
              revenueTTM: safe(m.revenueTTM),
              earningsPerShare: safe(m.epsTTM),

              news: (news || []).slice(0, 5).map(n => ({
                headline: n.headline,
                url: n.url,
                source: n.source
              }))
            }
          }

          // -----------------------------
          // MAIN
          // -----------------------------
          ;(async () => {
            const output = {}

            const all = [
              ...STOCKS.map(s => ({ sym: s, type: "stock" })),
              ...INDEXES.map(s => ({ sym: s, type: "index" }))
            ]

            for (const item of all) {
              try {
                const csv = await getCSV(item.sym)
                const priceData = parseCSV(csv)

                if (!priceData) continue

                const price = priceData.close
                const change = price - priceData.open
                const changePercent = priceData.open ? (change / priceData.open) * 100 : 0

                let enrichment = null

                // ONLY stocks get enrichment (important fix)
                if (item.type === "stock") {
                  try {
                    enrichment = await enrich(cleanSymbol(item.sym))
                  } catch {
                    enrichment = null
                  }
                }

                output[item.sym] = {
                  symbol: item.sym,
                  name: NAMES[item.sym] || item.sym,
                  type: item.type,

                  price: Number(price.toFixed(2)),
                  change: Number(change.toFixed(2)),
                  changePercent: Number(changePercent.toFixed(2)),
                  direction: direction(change),

                  // UI SAFE: always exists
                  enrichment: enrichment || {
                    fiftyTwoWeek: { low: 0, high: 0 },
                    marketCap: 0,
                    peRatio: 0,
                    revenueTTM: 0,
                    earningsPerShare: 0,
                    news: []
                  },

                  // UI FLAG (important)
                  ui: {
                    hasEnrichment: item.type === "stock",
                    isIndex: item.type === "index"
                  }
                }

              } catch {
                output[item.sym] = {
                  symbol: item.sym,
                  name: NAMES[item.sym] || item.sym,
                  type: item.type,
                  price: 0,
                  change: 0,
                  changePercent: 0,
                  direction: "flat",
                  enrichment: {
                    fiftyTwoWeek: { low: 0, high: 0 },
                    marketCap: 0,
                    peRatio: 0,
                    revenueTTM: 0,
                    earningsPerShare: 0,
                    news: []
                  },
                  ui: {
                    hasEnrichment: false,
                    isIndex: item.type === "index"
                  }
                }
              }
            }

            const finalOutput = {
              updatedAt: new Date().toISOString(),
              marketStatus: "live",
              data: output
            }

            fs.writeFileSync("stocks.json", JSON.stringify(finalOutput, null, 2))
            console.log("Market dataset fully rebuilt (stable + UI-ready)")
          })()
          EOF

      - name: Commit updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "feat: stable market engine + UI-safe schema [skip ci]" || echo "No changes"
          git push
