name: Fetch Stock Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market data (Stooq)
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          const SYMBOLS = [
            "aapl.us",
            "googl.us",
            "msft.us",
            "amzn.us",
            "tsla.us",
            "^dji",
            "^spx",
            "^ndq"
          ]

          const NAMES = {
            "aapl.us": "Apple Inc",
            "googl.us": "Alphabet Inc",
            "msft.us": "Microsoft Corp",
            "amzn.us": "Amazon.com Inc",
            "tsla.us": "Tesla Inc",
            "^dji": "Dow Jones Industrial Average",
            "^spx": "S&P 500",
            "^ndq": "Nasdaq Composite"
          }

          function getCSV(symbol) {
            const url = `https://stooq.com/q/l/?s=${symbol}&f=sd2t2ohlc&h&e=csv`

            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", chunk => data += chunk)
                res.on("end", () => resolve(data))
              }).on("error", () => resolve(""))
            })
          }

          function parseCSV(csv) {
            const lines = csv.trim().split("\n")
            if (lines.length < 2) return null

            const [header, row] = lines
            const cols = row.split(",")

            return {
              open: parseFloat(cols[2]) || 0,
              high: parseFloat(cols[3]) || 0,
              low: parseFloat(cols[4]) || 0,
              close: parseFloat(cols[5]) || 0
            }
          }

          ;(async () => {
            console.log("Fetching Stooq market data...")

            const results = {}

            for (const sym of SYMBOLS) {
              try {
                const csv = await getCSV(sym)
                const data = parseCSV(csv)

                if (!data) {
                  results[sym] = {
                    symbol: sym,
                    type: "stock",
                    name: NAMES[sym] || sym,
                    price: 0,
                    change: 0,
                    changePercent: 0
                  }
                  continue
                }

                const prev = data.open
                const price = data.close
                const change = price - prev
                const changePercent = prev ? (change / prev) * 100 : 0

                results[sym] = {
                  symbol: sym,
                  type: "stock",
                  name: NAMES[sym] || sym,
                  price,
                  change,
                  changePercent
                }

              } catch {
                results[sym] = {
                  symbol: sym,
                  type: "stock",
                  name: NAMES[sym] || sym,
                  price: 0,
                  change: 0,
                  changePercent: 0
                }
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              data: results
            }

            fs.writeFileSync("stocks.json", JSON.stringify(output, null, 2))
            console.log("stocks.json updated")
          })()
          EOF

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "chore: refresh stock data [skip ci]" || echo "No changes"
          git push
