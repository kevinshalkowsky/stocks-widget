name: Fetch Stock Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch stock + index data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SYMBOLS: "AAPL,GOOGL,MSFT,AMZN,TSLA,^DJI,^GSPC,^IXIC"
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          const API_KEY = process.env.FINNHUB_API_KEY

          const SYMBOLS = (process.env.SYMBOLS || "")
            .split(",")
            .filter(Boolean)
            .map(s => s.trim().toUpperCase())

          const BASE = "https://finnhub.io/api/v1"

          function get(url) {
            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", chunk => data += chunk)
                res.on("end", () => {
                  try {
                    resolve(JSON.parse(data))
                  } catch {
                    resolve({})
                  }
                })
              }).on("error", () => resolve({}))
            })
          }

          const INDEX_NAMES = {
            "^DJI": "Dow Jones Industrial Average",
            "^GSPC": "S&P 500",
            "^IXIC": "Nasdaq Composite"
          }

          async function fetchStock(sym) {
            const [quote, profile] = await Promise.all([
              get(`${BASE}/quote?symbol=${sym}&token=${API_KEY}`),
              get(`${BASE}/stock/profile2?symbol=${sym}&token=${API_KEY}`)
            ])

            return {
              symbol: sym,
              type: "stock",
              name: profile.name || sym,
              price: quote.c ?? 0,
              change: quote.d ?? 0,
              changePercent: quote.dp ?? 0,
              logo: profile.logo || ""
            }
          }

          async function fetchIndex(sym) {
            const now = Math.floor(Date.now() / 1000)
            const from = now - 2 * 86400

            const candles = await get(
              `${BASE}/stock/candle?symbol=${sym}&resolution=D&from=${from}&to=${now}&token=${API_KEY}`
            )

            const prices = candles.s === "ok" ? candles.c : []

            const latest = prices.length ? prices[prices.length - 1] : 0
            const prev = prices.length > 1 ? prices[prices.length - 2] : latest

            const change = latest - prev
            const changePercent = prev ? (change / prev) * 100 : 0

            return {
              symbol: sym,
              type: "stock", // keep unified for frontend simplicity
              name: INDEX_NAMES[sym] || sym,
              price: latest,
              change,
              changePercent,
              logo: ""
            }
          }

          ;(async () => {
            console.log("Fetching market data...")

            const results = {}

            for (const sym of SYMBOLS) {
              try {
                if (sym.startsWith("^")) {
                  results[sym] = await fetchIndex(sym)
                } else {
                  results[sym] = await fetchStock(sym)
                }
              } catch {
                results[sym] = {
                  symbol: sym,
                  type: "stock",
                  error: true
                }
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              data: results
            }

            fs.writeFileSync("stocks.json", JSON.stringify(output, null, 2))

            console.log("stocks.json updated successfully")
          })()
          EOF

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "chore: refresh stock data [skip ci]" || echo "No changes"
          git push
