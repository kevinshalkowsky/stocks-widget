name: Fetch Stock Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch stock and index data, write stocks.json
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SYMBOLS: "AAPL,GOOGL,MSFT,AMZN,TSLA"
          # Index quotes come from Yahoo Finance (free, no key needed).
          # ^GSPC = S&P 500 | ^DJI = Dow Jones | ^IXIC = Nasdaq Composite
          INDEX_SYMBOLS: "^GSPC,^DJI,^IXIC"
        run: |
          node << 'EOF'
          const https = require("https")

          const API_KEY  = process.env.FINNHUB_API_KEY
          const SYMBOLS  = process.env.SYMBOLS.split(",").map(s => s.trim().toUpperCase())
          const INDEXES  = process.env.INDEX_SYMBOLS.split(",").map(s => s.trim().toUpperCase())
          const BASE     = "https://finnhub.io/api/v1"

          // Human-readable display names for index symbols
          const INDEX_NAMES = {
            "^GSPC": "S&P 500",
            "^DJI":  "Dow Jones",
            "^IXIC": "Nasdaq",
          }

          function get(url, extraHeaders = {}) {
            return new Promise((resolve, reject) => {
              const options = {
                headers: {
                  // Yahoo requires a browser-like User-Agent or it returns 403
                  "User-Agent": "Mozilla/5.0 (compatible; StockFetcher/1.0)",
                  ...extraHeaders,
                }
              }
              https.get(url, options, (res) => {
                let data = ""
                res.on("data", chunk => data += chunk)
                res.on("end", () => {
                  try { resolve(JSON.parse(data)) }
                  catch (e) { reject(new Error(`JSON parse failed (status ${res.statusCode}): ${data.slice(0, 120)}`)) }
                })
              }).on("error", reject)
            })
          }

          function formatMarketCap(v) {
            if (!v) return ""
            if (v >= 1e12) return `$${(v / 1e12).toFixed(2)}T`
            if (v >= 1e9)  return `$${(v / 1e9).toFixed(2)}B`
            if (v >= 1e6)  return `$${(v / 1e6).toFixed(2)}M`
            return `$${v.toLocaleString()}`
          }

          function formatVolume(v) {
            if (!v) return ""
            if (v >= 1e9) return `${(v / 1e9).toFixed(1)}B`
            if (v >= 1e6) return `${(v / 1e6).toFixed(1)}M`
            if (v >= 1e3) return `${(v / 1e3).toFixed(1)}K`
            return `${v}`
          }

          function timeAgo(unixSec) {
            const diffMs = Date.now() - unixSec * 1000
            const mins = Math.floor(diffMs / 60000)
            if (mins < 60) return `${mins}m ago`
            const hrs = Math.floor(mins / 60)
            if (hrs < 24) return `${hrs}h ago`
            return `${Math.floor(hrs / 24)}d ago`
          }

          // ─── Fetch a regular stock (full data) ────────────────────────────────────
          async function fetchSymbol(sym) {
            const now    = Math.floor(Date.now() / 1000)
            const ago30d = now - 30 * 24 * 60 * 60
            const today  = new Date().toISOString().split("T")[0]
            const week   = new Date(Date.now() - 7 * 86400000).toISOString().split("T")[0]

            const [quote, profile, metric, news, candles, earnings, financials] =
              await Promise.allSettled([
                get(`${BASE}/quote?symbol=${sym}&token=${API_KEY}`),
                get(`${BASE}/stock/profile2?symbol=${sym}&token=${API_KEY}`),
                get(`${BASE}/stock/metric?symbol=${sym}&metric=all&token=${API_KEY}`),
                get(`${BASE}/company-news?symbol=${sym}&from=${week}&to=${today}&token=${API_KEY}`),
                get(`${BASE}/stock/candle?symbol=${sym}&resolution=D&from=${ago30d}&to=${now}&token=${API_KEY}`),
                get(`${BASE}/stock/earnings?symbol=${sym}&token=${API_KEY}`),
                get(`${BASE}/stock/financials-reported?symbol=${sym}&freq=annual&token=${API_KEY}`),
              ])

            const q = quote.status === "fulfilled" ? quote.value : {}
            const p = profile.status === "fulfilled" ? profile.value : {}
            const m = (metric.status === "fulfilled" ? metric.value?.metric : null) ?? {}
            const n = news.status === "fulfilled" && Array.isArray(news.value) ? news.value : []
            const c = candles.status === "fulfilled" ? candles.value : {}
            const e = earnings.status === "fulfilled" && Array.isArray(earnings.value) ? earnings.value : []
            const f = financials.status === "fulfilled" ? financials.value : {}

            const ic = f?.data?.[0]?.report?.ic ?? []
            const findLine = (label) => ic.find(l => l.label?.toLowerCase().includes(label))
            const revEntry  = findLine("revenue")
            const niEntry   = findLine("net income")
            const revenue   = revEntry ? formatMarketCap(revEntry.value) : ""
            const netIncome = niEntry  ? formatMarketCap(niEntry.value)  : ""
            const netMargin = revEntry?.value && niEntry?.value
              ? `${((niEntry.value / revEntry.value) * 100).toFixed(1)}%`
              : ""

            return {
              symbol:        sym,
              type:          "stock",
              price:         q.c  ?? 0,
              change:        q.d  ?? 0,
              changePercent: q.dp ?? 0,
              high:          q.h  ?? 0,
              low:           q.l  ?? 0,
              open:          q.o  ?? 0,
              prevClose:     q.pc ?? 0,
              name:          p.name            ?? sym,
              sector:        p.finnhubIndustry ?? "",
              marketCap:     formatMarketCap((p.marketCapitalization ?? 0) * 1e6),
              logo:          p.logo            ?? "",
              week52High:    m["52WeekHigh"]                  ?? 0,
              week52Low:     m["52WeekLow"]                   ?? 0,
              beta:          m.beta                           ?? 0,
              peRatio:       m.peNormalizedAnnual             ?? 0,
              eps:           m.epsNormalizedAnnual            ?? 0,
              dividendYield: m.dividendYieldIndicatedAnnual
                ? `${m.dividendYieldIndicatedAnnual.toFixed(2)}%`
                : "",
              volume:        formatVolume((m["10DayAverageTradingVolume"]  ?? 0) * 1e6),
              avgVolume:     formatVolume((m["3MonthAverageTradingVolume"] ?? 0) * 1e6),
              sparklineData: c.s === "ok" ? (c.c ?? []) : [],
              news: n.slice(0, 5).map(item => ({
                headline: item.headline ?? "",
                source:   item.source   ?? "",
                timeAgo:  timeAgo(item.datetime),
                url:      item.url      ?? "",
              })),
              earnings: e.slice(0, 4).map(item => ({
                quarter:   item.period          ?? "",
                estimated: item.estimate        ?? 0,
                actual:    item.actual          ?? 0,
                surprise:  item.surprisePercent ?? 0,
              })),
              revenue,
              netIncome,
              netMargin,
              revenueGrowth: "",
            }
          }

          // ─── Fetch a market index via Yahoo Finance (free, no key needed) ───────────
          // Yahoo symbols: %5EGSPC = ^GSPC, %5EDJI = ^DJI, %5EIXIC = ^IXIC
          // We use two Yahoo endpoints:
          //   - /v8/finance/chart  → quote fields + 30-day daily closes for sparkline
          //   - (no separate candle call needed; chart endpoint returns both)
          async function fetchIndex(sym) {
            const encodedSym = encodeURIComponent(sym)
            const ago30d     = Math.floor(Date.now() / 1000) - 30 * 24 * 60 * 60
            const now        = Math.floor(Date.now() / 1000)

            // Single call gets quote metadata AND historical closes
            const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodedSym}` +
                        `?interval=1d&period1=${ago30d}&period2=${now}&includePrePost=false`

            let q = {}, sparklineData = []
            try {
              const data   = await get(url)
              const result = data?.chart?.result?.[0]
              if (result) {
                const meta   = result.meta ?? {}
                const closes = result.indicators?.quote?.[0]?.close ?? []
                // Filter out null/undefined values Yahoo sometimes returns for non-trading days
                sparklineData = closes.filter(v => v != null)

                q = {
                  price:         meta.regularMarketPrice          ?? 0,
                  prevClose:     meta.regularMarketPreviousClose  ?? meta.previousClose ?? 0, // use prior day close, not chart range start
                  high:          meta.regularMarketDayHigh        ?? 0,
                  low:           meta.regularMarketDayLow         ?? 0,
                  open:          meta.regularMarketOpen           ?? 0,
                  week52High:    meta.fiftyTwoWeekHigh            ?? 0,
                  week52Low:     meta.fiftyTwoWeekLow             ?? 0,
                  volume:        formatVolume(meta.regularMarketVolume ?? 0),
                }
                q.change        = +(q.price - q.prevClose).toFixed(2)
                q.changePercent = q.prevClose
                  ? +((q.change / q.prevClose) * 100).toFixed(4)
                  : 0
              }
            } catch (err) {
              console.error(`  Yahoo fetch failed for ${sym}: ${err.message}`)
            }

            return {
              symbol:        sym,
              type:          "index",
              name:          INDEX_NAMES[sym] ?? sym,
              price:         q.price         ?? 0,
              change:        q.change        ?? 0,
              changePercent: q.changePercent ?? 0,
              high:          q.high          ?? 0,
              low:           q.low           ?? 0,
              open:          q.open          ?? 0,
              prevClose:     q.prevClose     ?? 0,
              week52High:    q.week52High    ?? 0,
              week52Low:     q.week52Low     ?? 0,
              volume:        q.volume        ?? "",
              sparklineData,
              // Fields not applicable to indexes — kept for schema consistency
              sector:        "",
              marketCap:     "",
              logo:          "",
              beta:          0,
              peRatio:       0,
              eps:           0,
              dividendYield: "",
              avgVolume:     "",
              news:          [],
              earnings:      [],
              revenue:       "",
              netIncome:     "",
              netMargin:     "",
              revenueGrowth: "",
            }
          }

          ;(async () => {
            const results = {}

            // Fetch indexes first (fewest API calls, good canary for key health)
            console.log(`Fetching indexes: ${INDEXES.join(", ")}`)
            for (const sym of INDEXES) {
              try {
                console.log(`  -> ${sym}`)
                results[sym] = await fetchIndex(sym)
                await new Promise(r => setTimeout(r, 300))
              } catch (err) {
                console.error(`  x ${sym}: ${err.message}`)
              }
            }

            // Then fetch individual stocks
            console.log(`Fetching stocks: ${SYMBOLS.join(", ")}`)
            for (const sym of SYMBOLS) {
              try {
                console.log(`  -> ${sym}`)
                results[sym] = await fetchSymbol(sym)
                await new Promise(r => setTimeout(r, 300))
              } catch (err) {
                console.error(`  x ${sym}: ${err.message}`)
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              indexes: Object.fromEntries(INDEXES.map(s => [s, results[s]]).filter(([,v]) => v)),
              stocks:  Object.fromEntries(SYMBOLS.map(s => [s, results[s]]).filter(([,v]) => v)),
            }

            require("fs").writeFileSync("stocks.json", JSON.stringify(output, null, 2))
            console.log(`Written stocks.json (${INDEXES.length} indexes, ${SYMBOLS.length} stocks)`)
          })()
          EOF

      - name: Push stocks.json via GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 stocks.json)
          SHA=$(gh api repos/${{ github.repository }}/contents/stocks.json --jq '.sha' 2>/dev/null || echo "")
          if [ -z "$SHA" ]; then
            gh api repos/${{ github.repository }}/contents/stocks.json \
              --method PUT \
              --field message="chore: refresh stock data [skip ci]" \
              --field content="$CONTENT"
          else
            gh api repos/${{ github.repository }}/contents/stocks.json \
              --method PUT \
              --field message="chore: refresh stock data [skip ci]" \
              --field content="$CONTENT" \
              --field sha="$SHA"
          fi
