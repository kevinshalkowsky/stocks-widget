name: Fetch Market Dashboard Data

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch market data (Stooq + Sparklines)
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          const SYMBOLS = [
            "aapl.us",
            "googl.us",
            "msft.us",
            "amzn.us",
            "tsla.us",
            "^dji",
            "^spx",
            "^ndq"
          ]

          const NAMES = {
            "aapl.us": "Apple Inc",
            "googl.us": "Alphabet Inc",
            "msft.us": "Microsoft Corp",
            "amzn.us": "Amazon.com Inc",
            "tsla.us": "Tesla Inc",
            "^dji": "Dow Jones",
            "^spx": "S&P 500",
            "^ndq": "Nasdaq"
          }

          const INDEX_SET = new Set(["^dji", "^spx", "^ndq"])

          function getCSV(symbol, range = "") {
            const url = `https://stooq.com/q/d/l/?s=${symbol}&i=d`
            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", chunk => data += chunk)
                res.on("end", () => resolve(data))
              }).on("error", () => resolve(""))
            })
          }

          function parseHistory(csv) {
            const lines = csv.trim().split("\n")
            if (lines.length < 2) return []

            const rows = lines.slice(1).map(line => {
              const cols = line.split(",")
              return {
                date: cols[0],
                close: parseFloat(cols[4])
              }
            })

            return rows.filter(r => !isNaN(r.close))
          }

          function buildSparkline(history, points = 30) {
            return history.slice(-points).map(p => p.close)
          }

          function calcChange(history) {
            if (history.length < 2) return { change: 0, changePercent: 0 }

            const latest = history[history.length - 1].close
            const prev = history[history.length - 2].close

            const change = latest - prev
            const changePercent = prev ? (change / prev) * 100 : 0

            return { latest, change, changePercent }
          }

          function direction(change) {
            if (change > 0) return "up"
            if (change < 0) return "down"
            return "flat"
          }

          ;(async () => {
            console.log("Building market dashboard feed...")

            const results = {}

            for (const sym of SYMBOLS) {
              try {
                const csv = await getCSV(sym)
                const history = parseHistory(csv)

                if (!history.length) {
                  results[sym] = {
                    symbol: sym,
                    name: NAMES[sym] || sym,
                    type: "stock",
                    price: 0,
                    change: 0,
                    changePercent: 0,
                    direction: "flat",
                    sparkline: []
                  }
                  continue
                }

                const { latest, change, changePercent } = calcChange(history)
                const sparkline = buildSparkline(history, 30)

                results[sym] = {
                  symbol: sym,
                  name: NAMES[sym] || sym,
                  type: "stock",
                  price: Number(latest.toFixed(2)),
                  change: Number(change.toFixed(2)),
                  changePercent: Number(changePercent.toFixed(2)),
                  direction: direction(change),
                  sparkline
                }

              } catch {
                results[sym] = {
                  symbol: sym,
                  name: NAMES[sym] || sym,
                  type: "stock",
                  price: 0,
                  change: 0,
                  changePercent: 0,
                  direction: "flat",
                  sparkline: []
                }
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              marketStatus: "live",
              data: results
            }

            fs.writeFileSync("stocks.json", JSON.stringify(output, null, 2))
            console.log("Dashboard feed updated")
          })()
          EOF

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "chore: update market dashboard feed [skip ci]" || echo "No changes"
          git push
