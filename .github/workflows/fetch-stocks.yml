name: Market Data Engine (Stooq + Finnhub)

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch Market Data (Dual Source)
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          node << 'EOF'
          const https = require("https")
          const fs = require("fs")

          // -----------------------------
          // CONFIG
          // -----------------------------
          const SYMBOLS = [
            "aapl.us",
            "googl.us",
            "msft.us",
            "amzn.us",
            "tsla.us",
            "^dji",
            "^spx",
            "^ndq"
          ]

          const NAMES = {
            "aapl.us": "Apple Inc",
            "googl.us": "Alphabet Inc",
            "msft.us": "Microsoft Corp",
            "amzn.us": "Amazon.com Inc",
            "tsla.us": "Tesla Inc",
            "^dji": "Dow Jones",
            "^spx": "S&P 500",
            "^ndq": "Nasdaq"
          }

          const API_KEY = process.env.FINNHUB_API_KEY
          const BASE = "https://finnhub.io/api/v1"

          // -----------------------------
          // HTTP helper
          // -----------------------------
          function get(url) {
            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", c => data += c)
                res.on("end", () => {
                  try { resolve(JSON.parse(data)) }
                  catch { resolve({}) }
                })
              }).on("error", () => resolve({}))
            })
          }

          // -----------------------------
          // STLOOQ PRICE ENGINE
          // -----------------------------
          function getStooqCSV(symbol) {
            const url = `https://stooq.com/q/l/?s=${symbol}&f=sd2t2ohlc&h&e=csv`

            return new Promise((resolve) => {
              https.get(url, (res) => {
                let data = ""
                res.on("data", c => data += c)
                res.on("end", () => resolve(data))
              }).on("error", () => resolve(""))
            })
          }

          function parseStooq(csv) {
            const lines = csv.trim().split("\n")
            if (lines.length < 2) return null

            const c = lines[1].split(",")

            const open = parseFloat(c[3])
            const close = parseFloat(c[6])

            if (isNaN(open) || isNaN(close)) return null

            return { open, close }
          }

          // -----------------------------
          // FINNHUB ENRICHMENT ENGINE
          // -----------------------------
          async function getEnrichment(sym) {
            const [profile, metrics, news] = await Promise.all([
              get(`${BASE}/stock/profile2?symbol=${sym}&token=${API_KEY}`),
              get(`${BASE}/stock/metric?symbol=${sym}&token=${API_KEY}`),
              get(`${BASE}/company-news?symbol=${sym}&from=2026-01-01&to=2026-12-31&token=${API_KEY}`)
            ])

            const m = metrics.metric || {}

            return {
              fiftyTwoWeek: {
                low: m["52WeekLow"] || null,
                high: m["52WeekHigh"] || null
              },
              marketCap: profile.marketCapitalization || null,
              peRatio: m.peBasicExclExtraTTM || null,
              revenueTTM: m.revenueTTM || null,
              earningsPerShare: m.epsTTM || null,
              news: (news || []).slice(0, 5).map(n => ({
                headline: n.headline,
                url: n.url,
                source: n.source
              }))
            }
          }

          function direction(change) {
            if (change > 0) return "up"
            if (change < 0) return "down"
            return "flat"
          }

          function clamp(n) {
            return Number(n.toFixed(2))
          }

          // -----------------------------
          // MAIN PIPELINE
          // -----------------------------
          ;(async () => {
            console.log("Running dual-source market engine...")

            const results = {}

            for (const sym of SYMBOLS) {
              try {

                // ---------------- PRICE (Stooq)
                const csv = await getStooqCSV(sym)
                const priceData = parseStooq(csv)

                if (!priceData) {
                  results[sym] = {
                    symbol: sym,
                    name: NAMES[sym] || sym,
                    type: "stock",
                    price: 0,
                    change: 0,
                    changePercent: 0,
                    direction: "flat",
                    enrichment: null
                  }
                  continue
                }

                const price = priceData.close
                const change = price - priceData.open
                const changePercent = priceData.open ? (change / priceData.open) * 100 : 0

                // ---------------- ENRICHMENT (Finnhub)
                let enrichment = null
                try {
                  enrichment = await getEnrichment(sym.replace("^", ""))
                } catch {
                  enrichment = null
                }

                // ---------------- RESULT
                results[sym] = {
                  symbol: sym,
                  name: NAMES[sym] || sym,
                  type: "stock",

                  price: clamp(price),
                  change: clamp(change),
                  changePercent: clamp(changePercent),
                  direction: direction(change),

                  enrichment
                }

              } catch {
                results[sym] = {
                  symbol: sym,
                  name: NAMES[sym] || sym,
                  type: "stock",
                  price: 0,
                  change: 0,
                  changePercent: 0,
                  direction: "flat",
                  enrichment: null
                }
              }
            }

            const output = {
              updatedAt: new Date().toISOString(),
              marketStatus: "live",
              data: results
            }

            fs.writeFileSync("stocks.json", JSON.stringify(output, null, 2))
            console.log("Dual-source market feed updated")
          })()
          EOF

      - name: Commit updated stocks.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add stocks.json
          git commit -m "chore: dual-source market engine update [skip ci]" || echo "No changes"
          git push
